<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Middle-earth Manager v11.1 (Auto-Map Routing)</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAcegclb9zUf2Yk1zi0qjNPvuI43uMsr-M",
          authDomain: "nazgul-campaign.firebaseapp.com",
          databaseURL: "https://nazgul-campaign-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "nazgul-campaign",
          storageBucket: "nazgul-campaign.firebasestorage.app",
          messagingSenderId: "931612776136",
          appId: "1:931612776136:web:091524d064d792e9bc77fd",
          measurementId: "G-7417E5KS9W"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref; window.dbSet = set; window.dbOnValue = onValue; window.dbPush = push;
    </script>

    <style>
        body { background-color: #202020; color: #d4af37; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; touch-action: none; }
        #viewport { flex: 3; position: relative; background: #111; overflow: hidden; cursor: grab; display: flex; align-items: center; justify-content: center; }
        #sidebar { flex: 1; min-width: 400px; background: #1a1a1a; border-left: 2px solid #444; padding: 20px; display: flex; flex-direction: column; z-index: 200; overflow-y: auto; }
        
        @media (max-width: 800px) {
            body { flex-direction: column; }
            #viewport { flex: 1; height: 50vh; }
            #sidebar { flex: 1; height: 50vh; min-width: 100%; border-left: none; border-top: 2px solid #444; padding: 10px; box-sizing: border-box; }
        }

        #world { position: absolute; top: 0; left: 0; transform-origin: 0 0; display: none; }
        #game-map { display: block; pointer-events: none; }
        #svg-layer, #marker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #svg-layer { z-index: 1; } #marker-layer { z-index: 2; }
        
        .map-polygon { pointer-events: auto; cursor: inherit; }
        .marker { position: absolute; transform: translate(-50%, -100%); display: flex; flex-direction: column; align-items: center; cursor: inherit; pointer-events: auto; z-index: 100; }
        
        .pin { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 5px #000; }
        .label { background: rgba(0,0,0,0.8); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-top: 2px; white-space: nowrap; }
        .region-text { position: absolute; transform: translate(-50%, -50%); font-family: serif; font-weight: bold; font-size: 24px; text-shadow: 0 0 5px #000; pointer-events: none; z-index: 50; text-align: center; }
        
        .controls { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap;}
        button, select, input, textarea { background: #333; color: #fff; border: 1px solid #555; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; font-family: sans-serif; }
        button:hover { background: #444; }
        input[type="text"], textarea { background: #222; border: 1px solid #d4af37; font-size: 14px; cursor: text; }
        .active-tool { background: #d4af37 !important; color: #000 !important; font-weight: bold; }
        
        .stat-btn { width: 30px; padding: 2px 0; margin-left: 5px; font-weight: bold; font-size: 16px; background: #444; border: 1px solid #666; border-radius: 4px; }
        .stat-btn:hover { background: #d4af37; color: #000; }
        
        #log { background: #000; border: 1px solid #333; flex-grow: 1; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 0.85em; color: #ccc; margin-bottom: 10px; min-height: 150px; }
        #settings-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .box { border: 2px solid #d4af37; padding: 30px; border-radius: 10px; background: #222; text-align: left; width: 90%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; }
        
        #map-tools, #draw-tools { position: absolute; z-index: 1000; display: none; gap: 10px; }
        #map-tools { bottom: 20px; left: 20px; }
        #draw-tools { top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 10px; border: 1px solid #d4af37; display: flex; align-items: center;}
        .float-btn { width: auto; padding: 10px 15px; background: rgba(0,0,0,0.8); border: 1px solid #888; font-size: 16px;}
        
        .ai-gm { color: #d4af37; font-style: normal; border-left: 3px solid #d4af37; padding-left: 10px; margin: 10px 0; background: #1a1a1a; padding: 10px; border-radius: 0 4px 4px 0;}
        .ai-result { color: #88ccff; font-style: italic; border-left: 3px solid #88ccff; padding-left: 10px; margin: 10px 0; background: #112233; padding: 10px; border-radius: 0 4px 4px 0;}
        .ai-error { color: #ff6666; border-left: 3px solid #ff6666; padding-left: 10px; margin: 10px 0; background: #331111; padding: 10px; border-radius: 0 4px 4px 0;}
        .test-log-box { border-left: 4px solid #ff8800; margin: 10px 0; background: #2a1a00; padding: 10px; border-radius: 0 4px 4px 0; }
        
        .file-upload-box { background: #2a2a2a; border: 1px dashed #d4af37; padding: 10px; text-align: center; margin-bottom: 15px; font-size: 0.9em; display: none; }
        .section-title { font-size: 0.9em; text-transform: uppercase; color: #888; margin: 10px 0 5px 0; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="settings-overlay" style="display:none;">
            <div class="box">
                <h2 style="margin-top:0; text-align:center;">Asetukset</h2>
                <label style="color:#aaa; font-size:0.9em;">Gemini API Key:</label>
                <input type="password" id="apiKeyInput" placeholder="Liitä API-avain tähän...">
                <button id="gmUnlockBtn" onclick="unlockGM()" style="background:#552222; margin-top:10px;">🔒 Avaa GM-työkalut</button>
                <div id="gmSecretArea" style="display:none; flex-direction:column; gap:10px; margin-top:10px; border-top:1px solid #444; padding-top:10px;">
                    <label style="color:#d4af37; font-size:0.9em; font-weight:bold;">Kampanjan Lore (SALAISTA):</label>
                    <textarea id="loreInput" placeholder="Lore latautuu tähän automaattisesti..." style="height: 150px; resize: vertical;"></textarea>
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="saveSettings()" style="background:#28a745; flex:2;">Tallenna & Sulje</button>
                    <button onclick="closeSettings()" style="background:#442222; flex:1;">Peruuta</button>
                </div>
            </div>
        </div>

        <div id="map-tools">
            <button class="float-btn" onclick="fitToScreen()">Sovita</button>
            <button class="float-btn" onclick="zoomIn()">+</button>
            <button class="float-btn" onclick="zoomOut()">-</button>
        </div>

        <div id="draw-tools">
            <span style="color:#fff; margin-right:10px; display:none;">Piirretään...</span>
            <button onclick="undoLastPoint()" style="width:auto; background:#ff8800; color:#fff;">↩️</button>
            <button onclick="finishPoly()" style="width:auto; background:#28a745;">✔</button>
            <button onclick="cancelPoly()" style="width:auto; background:#dc3545;">❌</button>
        </div>

        <div id="world">
            <img id="game-map" alt="Kartta">
            <svg id="svg-layer"></svg>
            <div id="marker-layer"></div>
        </div>
    </div>

    <div id="sidebar">
        <h2 style="color:#ff4500; text-align:center; margin-top:0;">NAZGÛL COMMAND</h2>
        
        <div class="file-upload-box" id="manual-upload-box">
            <span style="color:#f66"><b>Pääkarttaa ei löytynyt!</b></span><br>
            <input type="file" accept="image/*" onchange="handleInput(this)" style="margin-top:5px;">
        </div>

        <select id="nazgulSelect" onchange="updateUI()">
            <option value="0">Ren the Unclean</option>
            <option value="1">Murazor (Witch-King)</option>
            <option value="2">Uvatha</option>
            <option value="3">Hoarmurath</option>
            <option value="4">Akhorahil</option>
        </select>

        <div id="statsDisplay" style="margin:10px 0;"></div>
        
        <div class="section-title">Karttatyökalut</div>
        <div class="controls" id="map-tool-btns">
            <button id="btnMove" onclick="setTool('move')" class="active-tool" style="width:auto;flex:1;">✋ Liikuta</button>
            <button id="btnFort" onclick="setTool('fort')" style="width:auto;flex:1;">🏰 Linnoita</button>
            <button id="btnArea" onclick="setTool('area')" style="width:auto;flex:1;">✏️ Alue</button>
            <button id="btnEdit" onclick="setTool('edit')" style="width:auto;flex:1; background:#4466aa;">📝 Muokkaa</button>
            <button id="btnDelete" onclick="setTool('delete')" style="width:auto;flex:1; background:#aa3333;">🗑️ Tuhoa</button>
        </div>

        <hr style="border-color:#444;">
        
        <div class="section-title">Tekoäly-GM & Toiminnot</div>
        
        <div class="controls" style="margin-bottom: 5px;">
            <label style="display:flex; align-items:center; cursor:pointer; font-size:0.9em; background:#2a1a00; padding:10px; border-radius:4px; border:1px solid #ff8800; width:100%; color:#ffaa00; font-weight:bold;">
                <input type="checkbox" id="testMode" style="width:auto; margin-right:10px; transform: scale(1.2);"> 🧪 Testitila (ei tallennu)
            </label>
        </div>

        <div class="controls">
            <input type="text" id="intentInput" placeholder="Aie (esim. 'Hyökkään Kajbahiin')">
        </div>
        <div class="controls">
            <button onclick="askGM()" style="background:#5c3a21; border-color:#d4af37;">🔮 1. Kysy arvio</button>
        </div>

        <div class="controls" style="margin-top:10px;">
            <input type="number" id="dice" placeholder="Nopat" value="3">
            <input type="number" id="ob" placeholder="Ob" value="3">
        </div>
        <div class="controls">
            <button onclick="performAction('Rakenna', 'wealth')">🛠️ Rakenna</button>
            <button onclick="performAction('Sota', 'might')">⚔️ Sota</button>
        </div>
        <div class="controls">
            <button onclick="performAction('Uskonto', 'religion')">👁️ Uskonto</button>
            <button onclick="performAction('Hallinto', 'loyalty')">⚖️ Hallinto</button>
        </div>

        <div class="section-title">Kronikka</div>
        <div id="log"></div>
        <div style="display:flex; gap:5px;">
            <button onclick="exportLog()" style="background:#28a745; font-size:0.8em;">💾 Lataa</button>
            <button onclick="clearLog()" style="background:#442222; font-size:0.8em;">Tyhjennä</button>
            <button onclick="openSettings()" style="background:#333; font-size:0.8em;">⚙️ Asetukset</button>
        </div>
    </div>

    <script>
        let nazguls = [
            { name: "Ren", wealth: 4, religion: 6, loyalty: 2, might: 5, corruption: 3, color: "#ff4444", markers: [], territories: [] },
            { name: "Murazor", wealth: 2, religion: 8, loyalty: 5, might: 3, corruption: 2, color: "#aa44ff", markers: [], territories: [] },
            { name: "Uvatha", wealth: 5, religion: 3, loyalty: 6, might: 7, corruption: 1, color: "#ffaa00", markers: [], territories: [] },
            { name: "Hoarmurath", wealth: 3, religion: 4, loyalty: 4, might: 5, corruption: 1, color: "#00ccff", markers: [], territories: [] },
            { name: "Akhorahil", wealth: 7, religion: 2, loyalty: 3, might: 2, corruption: 1, color: "#ffd700", markers: [], territories: [] }
        ];

        let view = { x: 0, y: 0, scale: 1 };
        let tool = 'move', isDragging = false, draw = { active: false, points: [] }, currentNaz = 0;
        let lastTouch = {x: 0, y: 0}; 
        let initialPinchDist = null;

        let geminiKey = localStorage.getItem('geminiKey') || "";
        let campaignLore = localStorage.getItem('campaignLore') || ""; 
        
        let logs = []; 
        let testLogs = []; 

        // Tähän tallennetaan lore.txt tiedostosta luetut kartta-avainsanat
        window.autoMapDict = []; 

        window.onload = async function() {
            let imgElement = document.getElementById('game-map');
            imgElement.onload = function() { startMap(imgElement); };
            imgElement.onerror = function(e) { document.getElementById('manual-upload-box').style.display = 'block'; };
            imgElement.src = "./kartta.jpg?t=" + Date.now();

            try {
                let loreRes = await fetch('./lore.txt?t=' + Date.now());
                if (loreRes.ok) {
                    let text = await loreRes.text();
                    if (!text.includes("<!DOCTYPE html>")) {
                        campaignLore = text; 
                        document.getElementById('loreInput').value = text;
                        
                        // PARSITAAN AUTOMAATTISET KARTTA-AVAINSANAT
                        let lines = text.split('\n');
                        window.autoMapDict = [];
                        lines.forEach(line => {
                            // Etsitään rivejä muodossa MAP:tiedostonimi.jpg = sana1, sana2
                            let m = line.match(/^MAP:(.*?)=(.*)$/i);
                            if(m) {
                                let filename = m[1].trim();
                                let keywords = m[2].split(',').map(k => k.trim().toLowerCase());
                                window.autoMapDict.push({filename, keywords});
                            }
                        });
                        console.log("Ladattiin automaattiset kartat:", window.autoMapDict);
                    }
                }
            } catch (err) {}

            setTimeout(() => {
                if(window.db) {
                    window.dbOnValue(window.dbRef(window.db, 'gameState'), (snapshot) => {
                        let data = snapshot.val();
                        if(data) {
                            if(data.nazguls) nazguls = data.nazguls;
                            if(data.logs) { logs = Object.values(data.logs).reverse(); renderLog(); }
                            updateUI(); renderOverlays();
                        }
                    });
                }
            }, 1000);
            setupListeners(); updateUI();
        };

        function startMap(img) {
            document.getElementById('world').style.display = 'block';
            document.getElementById('manual-upload-box').style.display = 'none';
            let w = img.naturalWidth || 1000, h = img.naturalHeight || 1000;
            document.getElementById('svg-layer').setAttribute('viewBox', `0 0 ${w} ${h}`);
            document.getElementById('marker-layer').style.width = w + 'px';
            document.getElementById('marker-layer').style.height = h + 'px';
            setTimeout(() => { fitToScreen(); renderOverlays(); }, 100);
        }

        function updateTransform() { document.getElementById('world').style.transform = `translate3d(${view.x}px, ${view.y}px, 0) scale(${view.scale})`; }
        
        function fitToScreen() {
            let img = document.getElementById('game-map'), vp = document.getElementById('viewport');
            let w = img.naturalWidth || 1000, h = img.naturalHeight || 1000;
            let vpw = vp.offsetWidth > 0 ? vp.offsetWidth : window.innerWidth;
            let vph = vp.offsetHeight > 0 ? vp.offsetHeight : window.innerHeight / 2;
            let s = Math.min(vpw / w, vph / h) * 0.95;
            if (s <= 0) s = 0.5;
            view.scale = s; view.x = (vpw - w * s) / 2; view.y = (vph - h * s) / 2;
            updateTransform();
        }

        function zoomIn() { view.scale *= 1.3; updateTransform(); }
        function zoomOut() { view.scale /= 1.3; updateTransform(); }
        
        function getCoords(e) {
            if(e.touches && e.touches.length > 0) return {x: e.touches[0].clientX, y: e.touches[0].clientY};
            return {x: e.clientX, y: e.clientY};
        }

        function setupListeners() {
            let vp = document.getElementById('viewport');
            vp.addEventListener('mousedown', onDragStart);
            window.addEventListener('mousemove', onDragMove);
            window.addEventListener('mouseup', onDragEnd);
            vp.addEventListener('touchstart', onDragStart, {passive: false});
            vp.addEventListener('touchmove', onDragMove, {passive: false});
            vp.addEventListener('touchend', onDragEnd);
            vp.addEventListener('wheel', (e) => {
                e.preventDefault();
                let z = e.deltaY > 0 ? 0.9 : 1.1, rect = vp.getBoundingClientRect();
                let mx = e.clientX - rect.left, my = e.clientY - rect.top;
                view.x = mx - (mx - view.x) * z; view.y = my - (my - view.y) * z; view.scale *= z;
                updateTransform();
            }, {passive: false});
            window.addEventListener('resize', () => {
                clearTimeout(window.resizeTimer);
                window.resizeTimer = setTimeout(fitToScreen, 200);
            });
        }

        function onDragStart(e) {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            let target = e.target;
            if(tool === 'edit') {
                let markerEl = target.closest('.marker');
                if(markerEl) {
                    let nIdx = markerEl.getAttribute('data-naz'); let mIdx = markerEl.getAttribute('data-mar');
                    let currentName = nazguls[nIdx].markers[mIdx].label; let newName = prompt("Nimeä uudelleen:", currentName);
                    if(newName && newName !== currentName) { nazguls[nIdx].markers[mIdx].label = newName; renderOverlays(); uploadState(); } return;
                }
                if(target.tagName && target.tagName.toLowerCase() === 'polygon' && target.classList.contains('map-polygon')) {
                    let nIdx = target.getAttribute('data-naz'); let tIdx = target.getAttribute('data-ter');
                    let currentName = nazguls[nIdx].territories[tIdx].label; let newName = prompt("Nimeä uudelleen:", currentName);
                    if(newName && newName !== currentName) { nazguls[nIdx].territories[tIdx].label = newName; renderOverlays(); uploadState(); } return;
                } return; 
            }
            if(tool === 'delete') {
                let markerEl = target.closest('.marker');
                if(markerEl) {
                    let nIdx = markerEl.getAttribute('data-naz'); let mIdx = markerEl.getAttribute('data-mar');
                    if(confirm(`Tuhoa: ${nazguls[nIdx].markers[mIdx].label}?`)) { nazguls[nIdx].markers.splice(mIdx, 1); renderOverlays(); uploadState(); } return;
                }
                if(target.tagName && target.tagName.toLowerCase() === 'polygon' && target.classList.contains('map-polygon')) {
                    let nIdx = target.getAttribute('data-naz'); let tIdx = target.getAttribute('data-ter');
                    if(confirm(`Poista alue: ${nazguls[nIdx].territories[tIdx].label}?`)) { nazguls[nIdx].territories.splice(tIdx, 1); renderOverlays(); uploadState(); } return;
                } return; 
            }
            if (e.touches) {
                if (e.touches.length === 2) {
                    isDragging = false; initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                } else if (e.touches.length === 1) {
                    initialPinchDist = null;
                    if(tool === 'move') { isDragging = true; lastTouch = {x: e.touches[0].clientX, y: e.touches[0].clientY}; } 
                    else if(tool === 'fort') { let c = getWorldCoords(e), name = prompt("Linnoituksen nimi:"); if(name) { if (!nazguls[currentNaz].markers) nazguls[currentNaz].markers = []; nazguls[currentNaz].markers.push({x: c.x, y: c.y, label: name}); renderOverlays(); uploadState(); } } 
                    else if(tool === 'area') { draw.points.push(getWorldCoords(e)); renderTempPoly(); }
                }
            } else {
                if(tool === 'move') { isDragging = true; lastTouch = {x: e.clientX, y: e.clientY}; } 
                else if(tool === 'fort') { let c = getWorldCoords(e), name = prompt("Linnoituksen nimi:"); if(name) { if (!nazguls[currentNaz].markers) nazguls[currentNaz].markers = []; nazguls[currentNaz].markers.push({x: c.x, y: c.y, label: name}); renderOverlays(); uploadState(); } } 
                else if(tool === 'area') { draw.points.push(getWorldCoords(e)); renderTempPoly(); }
            }
        }
        
        function onDragMove(e) { 
            if (e.touches && e.touches.length === 2) {
                if (e.cancelable) e.preventDefault(); 
                let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (initialPinchDist) {
                    let zoomFactor = currentDist / initialPinchDist;
                    let cx = (e.touches[0].clientX + e.touches[1].clientX) / 2; let cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    let vp = document.getElementById('viewport'); let rect = vp.getBoundingClientRect();
                    view.x = (cx - rect.left) - ((cx - rect.left) - view.x) * zoomFactor;
                    view.y = (cy - rect.top) - ((cy - rect.top) - view.y) * zoomFactor;
                    view.scale *= zoomFactor; updateTransform();
                }
                initialPinchDist = currentDist; 
            } else if(isDragging && tool === 'move') { 
                if (e.type === 'touchmove' && e.cancelable) e.preventDefault();
                let c = e.touches ? {x: e.touches[0].clientX, y: e.touches[0].clientY} : {x: e.clientX, y: e.clientY};
                view.x += c.x - lastTouch.x; view.y += c.y - lastTouch.y; lastTouch = c; updateTransform(); 
            } 
        }
        
        function onDragEnd(e) { 
            if (e.touches && e.touches.length === 1) {
                lastTouch = {x: e.touches[0].clientX, y: e.touches[0].clientY}; isDragging = (tool === 'move'); initialPinchDist = null;
            } else if (!e.touches || e.touches.length === 0) { isDragging = false; initialPinchDist = null; }
        }
        
        function getWorldCoords(e) { 
            let c = (e.touches && e.touches.length > 0) ? {x: e.touches[0].clientX, y: e.touches[0].clientY} : {x: e.clientX, y: e.clientY};
            let r = document.getElementById('world').getBoundingClientRect(); return { x: (c.x - r.left) / view.scale, y: (c.y - r.top) / view.scale }; 
        }

        function uploadState() { if(window.db) window.dbSet(window.dbRef(window.db, 'gameState/nazguls'), nazguls); }
        function pushLog(h) { logs.unshift(h); renderLog(); if(window.db) window.dbPush(window.dbRef(window.db, 'gameState/logs'), h); }
        function pushTestLog(h) { testLogs.unshift(`<div class="test-log-box"><span style="color:#ffaa00; font-size:0.8em; font-weight:bold; letter-spacing:1px;">🧪 TESTITILA</span><br>${h}</div>`); renderLog(); }
        function renderLog() { document.getElementById('log').innerHTML = testLogs.join("") + logs.join(""); }
        function clearLog() { if(confirm("Tyhjennä koko kronikan historia? (Myös testit poistuvat)")) { logs=[]; testLogs=[]; renderLog(); if(window.db) window.dbSet(window.dbRef(window.db, 'gameState/logs'), null); } }

        function adjustStat(stat, amount) {
            let n = nazguls[currentNaz]; n[stat] += amount;
            if(n[stat] < 0) n[stat] = 0; if(n[stat] > 10) n[stat] = 10;
            updateUI(); uploadState(); 
        }

        // --- UUSI AUTOMAATTISEN KARTAN HAKU ---
        async function fetchAutoMapForIntent(intent) {
            if(!window.autoMapDict || window.autoMapDict.length === 0) return null;
            
            let intentLower = intent.toLowerCase();
            let matchedFilename = null;
            
            // Etsitään osumaa sanakirjasta
            for(let m of window.autoMapDict) {
                for(let kw of m.keywords) {
                    if(intentLower.includes(kw)) {
                        matchedFilename = m.filename;
                        break;
                    }
                }
                if(matchedFilename) break;
            }
            
            if(!matchedFilename) return null;
            
            // Haetaan kuva GitHubista
            try {
                let res = await fetch('./' + matchedFilename + '?t=' + Date.now());
                if(res.ok) {
                    let blob = await res.blob();
                    // Varmistetaan ettei se ole virhesivu (text/html)
                    if(blob.type.includes('image')) {
                        let base64 = await new Promise((resolve) => {
                            let reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result.split(',')[1]);
                            reader.readAsDataURL(blob);
                        });
                        return { base64: base64, mimeType: blob.type, filename: matchedFilename };
                    }
                }
            } catch(e) {
                console.log("Automaattista karttaa ei saatu ladattua:", matchedFilename);
            }
            return null;
        }

        function getRecentHistoryContext() {
            if (!logs || logs.length === 0) return "";
            let tempDiv = document.createElement('div');
            let recent = logs.slice(0, 5).reverse(); 
            let text = "";
            recent.forEach(l => {
                tempDiv.innerHTML = l.replace(/<br>/g, '\n');
                let clean = (tempDiv.innerText || tempDiv.textContent).trim();
                if(!clean.includes("API Virhe") && !clean.includes("ladattu automaattisesti")) { text += "- " + clean + "\n"; }
            });
            return text === "" ? "" : `\n\n=== VIIMEAIKAISET TAPAHTUMAT ===\n${text}================================\nHuomioi nämä äskettäiset tapahtumat.\n`;
        }

        async function askGM() {
            let intent = document.getElementById('intentInput').value;
            if(!intent) return alert("Kirjoita ensin aikeesi tekstikenttään!");
            if(!geminiKey) { alert("Aseta Gemini API Key asetuksista ensin!"); openSettings(); return; }

            let isTest = document.getElementById('testMode').checked;
            let n = nazguls[currentNaz];
            
            // 1. HAETAAN AUTOMAATTINEN KARTTA JOS LÖYTYY
            let autoMap = await fetchAutoMapForIntent(intent);

            let loadId = "load-"+Date.now();
            document.getElementById('log').innerHTML = `<div id="${loadId}" style="color:#d4af37">🧙‍♂️ GM miettii... ${autoMap ? '(Tutkii automaattikarttaa 🗺️)' : ''}</div>` + document.getElementById('log').innerHTML;
            
            let loreContext = campaignLore ? `\n\n=== KAMPANJAN LORE ===\n${campaignLore}\n======================\nKäytä tätä maailman taustana.\n` : "";
            let historyContext = getRecentHistoryContext();
            let imageContext = autoMap ? `\n\nHUOM: Olen liittänyt tähän pyyntöön kuvan kartasta (${autoMap.filename}). Analysoi sen maastonmuotoja (vuoret, joet, metsät, pullonkaulat) ja ota ne huomioon arviossasi ja vaikeustasossa!\n` : "";

            let prompt = `Olet pelinjohtaja (Game Master) Keskimaahan sijoittuvassa roolipelissä (Burning Wheel). Pelaaja on Nazgûl ${n.name}.
Aie (Intent): "${intent}".
${loreContext}
${historyContext}
${imageContext}
Tehtäväsi:
1. Kerro 2-3 lauseella lyhyt, tunnelmallinen kuvaus kohteesta (noudata lorea ja mahdollista liitettyä karttaa).
2. Määritä toiminnalle vaikeustaso eli Ob (luku 1-6). 
Vastaa ytimekkäästi suomeksi:
Tarinallinen arvio: [Teksti]
Ehdottamasi Ob: [Numero]`;

            let txt = await callAI(prompt, autoMap ? autoMap.base64 : null, autoMap ? autoMap.mimeType : null);
            let l = document.getElementById(loadId); if(l) l.remove();
            
            if(txt) {
                let time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                let mapTag = autoMap ? ` <span style="font-size:0.8em; color:#88ccff;">[🗺️ Automaattinen kartta: ${autoMap.filename}]</span>` : "";
                
                if (txt.startsWith("⚠️")) {
                    if(isTest) pushTestLog(`<div class="ai-error">${txt}</div>`);
                    else pushLog(`<div class="ai-error">${txt}</div><hr style="border-color:#333">`);
                } else {
                    let msg = `<div><span style="color:#666">[${time}]</span> <b style="color:${n.color}">${n.name} aie:</b> ${intent}${mapTag}</div><div class="ai-gm"><b>👑 GM vastaa:</b><br>${txt.replace(/\n/g, '<br>')}</div><hr style="border-color:#333">`;
                    if(isTest) pushTestLog(msg);
                    else pushLog(msg);
                }
            }
        }

        function rollDice(num) {
            let r = [];
            for(let i=0; i<num; i++) r.push(Math.floor(Math.random()*6)+1);
            return r;
        }

        async function performAction(action, stat) {
            let d = parseInt(document.getElementById('dice').value)||0, ob = parseInt(document.getElementById('ob').value)||0;
            let intent = document.getElementById('intentInput').value || "Ei määritettyä aietta";
            if(!d || !ob) return alert("Aseta Nopat ja Ob!");
            
            let autoMap = await fetchAutoMapForIntent(intent);

            let isTest = document.getElementById('testMode').checked;
            let n = nazguls[currentNaz];
            let succ = 0; let sixes = 0; let allRolls = [];
            
            let initialRolls = rollDice(d);
            initialRolls.forEach(r => { allRolls.push(r); if (r >= 4) succ++; if (r === 6) sixes++; });
            allRolls.sort((a,b)=>b-a);
            let explodeLog = "";

            if (sixes > 0 && succ < ob) {
                if(confirm(`Sait vasta ${succ} onnistumista, mutta tarvitset ${ob} (Ob).\nHeitit kuitenkin ${sixes} kpl kuutosia!\n\nHaluatko käyttää "Fatea" ja avata (räjäyttää) kuutoset?`)) {
                    let currentSixes = sixes;
                    while(currentSixes > 0) {
                        let extraRolls = rollDice(currentSixes);
                        explodeLog += ` 💥[${extraRolls.sort((a,b)=>b-a).join(",")}]`;
                        currentSixes = 0; 
                        extraRolls.forEach(r => { if (r >= 4) succ++; if (r === 6) currentSixes++; allRolls.push(r); });
                    }
                }
            }

            let margin = succ - ob;
            let res = margin >= 0 ? "ONNISTUI" : "EPÄONNISTUI";
            let col = margin >= 0 ? "#4f4" : "#f44";
            let time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            let msgDice = `<div><span style="color:#666">[${time}]</span> <b style="color:${n.color}">${n.name}</b>: ${action} (Ob ${ob})<br>🎲 [${initialRolls.join(",")}]${explodeLog} -> Yhteensä ${succ} onnistumista. <span style="color:${col}">${res}</span></div>`;
            
            if (isTest) pushTestLog(msgDice); else { pushLog(msgDice); uploadState(); }

            if(geminiKey) {
                let loadId = "load-"+Date.now();
                document.getElementById('log').innerHTML = `<div id="${loadId}" style="color:#88ccff">🔮 GM arvioi lopputulosta ja stattimuutoksia...</div>` + document.getElementById('log').innerHTML;
                
                let loreContext = campaignLore ? `\nLore:\n${campaignLore}\n` : "";
                let historyContext = getRecentHistoryContext();
                let currentStats = `Vauraus: ${n.wealth}, Uskonto: ${n.religion}, Asevoima: ${n.might}, Lojaalisuus: ${n.loyalty}`;
                let imageContext = autoMap ? `\n\nHUOM: Olen liittänyt tähän pyyntöön kuvan kartasta. Käytä kartan maastonmuotoja (vuoret, joet, metsät) apunasi kuvaillessasi, miksi tehtävä onnistui tai epäonnistui!\n` : "";

                let prompt = `Pelinjohtaja Keskimaassa. Pelaaja: Nazgûl ${n.name}. 
Aie: "${intent}". Toiminto: ${action}. 
Tulos: ${res} (Marginaali vaadittuun Ob-arvoon: ${margin}). 
Nykyiset resurssit: ${currentStats}.
${loreContext}
${historyContext}
${imageContext}
Tehtäväsi:
1. Kuvaile lopputulos tarinallisesti (max 3 lausetta) huomioiden alueen lore ja mahdollinen karttakuva.
2. Määritä toimenpiteen vaatima resurssin muutos. Normaali muutos on korkeintaan +1 tai -1. 
HUOM: Jos toiminto on "Sota" ja kyseessä on epäonnistuminen, muutos voi olla Raskas tappio (-2 tai -3) tai Katastrofi (-4, -5 tai -6). 
Kirjoita vastauksen loppuun TÄSMÄLLEEN tämä koodirivi, josta ohjelma lukee muutoksen (stat-vaihtoehdot: wealth, religion, might, loyalty). Jos ei muutosta, laita change 0.
ESIMERKKI: [STAT] {"stat": "might", "change": -1} [/STAT]`;

                let txt = await callAI(prompt, autoMap ? autoMap.base64 : null, autoMap ? autoMap.mimeType : null);
                let l = document.getElementById(loadId); if(l) l.remove();
                
                if(txt && !txt.startsWith("⚠️")) {
                    let match = txt.match(/\[STAT\](.*?)\[\/STAT\]/is);
                    let cleanTxt = txt; let statParsed = null;
                    if (match) { cleanTxt = txt.replace(match[0], '').trim(); try { statParsed = JSON.parse(match[1].trim()); } catch(e) {} }

                    if (statParsed && statParsed.change !== 0 && statParsed.stat) {
                        let sKey = statParsed.stat.toLowerCase(); let sVal = parseInt(statParsed.change);
                        let sCurr = n[sKey] !== undefined ? n[sKey] : 1;
                        if(sCurr < 1) sCurr = 1; if(sCurr > 10) sCurr = 10;
                        
                        let chances = {
                            1: {u: 90, d: 10}, 2: {u: 80, d: 20}, 3: {u: 70, d: 30}, 4: {u: 60, d: 40}, 5: {u: 50, d: 50},
                            6: {u: 30, d: 40}, 7: {u: 10, d: 50}, 8: {u: 5, d: 60}, 9: {u: 2, d: 95}, 10: {u: 0, d: 95}
                        };
                        
                        let chance = sVal > 0 ? chances[sCurr].u : chances[sCurr].d;
                        let roll100 = Math.floor(Math.random() * 100) + 1;
                        let isSuccess = roll100 <= chance;
                        let statNamesFi = {wealth:"Vauraus", might:"Asevoima", religion:"Uskonto", loyalty:"Lojaalisuus"};
                        let fiName = statNamesFi[sKey] || sKey;

                        let logMsg = `<div style="background:#222; border:1px dashed #d4af37; padding:8px; margin-top:10px; font-size:0.9em;">`;
                        logMsg += `<b>⚙️ Järjestelmä:</b> GM ehdottaa muutosta <b>${fiName} ${sVal > 0 ? '+'+sVal : sVal}</b>.<br>`;
                        logMsg += `Nykyarvo on ${sCurr} -> Muutoksen todennäköisyys: <b>${chance}%</b>.<br>`;
                        logMsg += `Noppa d100: <b>${roll100}</b> -> `;
                        if (isSuccess) {
                            logMsg += `<span style="color:#4f4; font-weight:bold;">TOTEUTUU!</span>`;
                            if(!isTest) adjustStat(sKey, sVal); else logMsg += ` <i style="color:#ffaa00;">(Testitila: ei oikeaa muutosta)</i>`;
                        } else {
                            logMsg += `<span style="color:#f44; font-weight:bold;">EI TOTEUDU.</span> Arvo pysyy samana.`;
                        }
                        logMsg += `</div>`;
                        cleanTxt += logMsg;
                    }
                    
                    let finalMsg = `<div class="ai-result"><b>📜 Lopputulos:</b><br>${cleanTxt.replace(/\n/g, '<br>')}</div><hr style="border-color:#333">`;
                    if(isTest) pushTestLog(finalMsg); else pushLog(finalMsg);
                    
                } else if (txt) {
                    if(isTest) pushTestLog(`<div class="ai-error">${txt}</div>`); else pushLog(`<div class="ai-error">${txt}</div><hr style="border-color:#333">`);
                }
            } else if(!isTest) { pushLog(`<hr style="border-color:#333">`); }
        }

        async function callAI(prompt, imageBase64 = null, mimeType = null) {
            if (!geminiKey) return "⚠️ API Virhe: API-avain puuttuu.";
            
            let modelsJson;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${geminiKey}`);
                modelsJson = await res.json();
                if (modelsJson.error) return "⚠️ API Virhe: " + (modelsJson.error.message);
            } catch (e) { return "⚠️ API Virhe: Yhteysvirhe."; }
            
            const models = modelsJson.models || [];
            const candidates = models.filter(m => (m.supportedGenerationMethods || m.supportedMethods || []).includes("generateContent") && (m.name || "").startsWith("models/") && (m.name || "").includes("gemini")).sort((a, b) => { const an = a.name || "", bn = b.name || ""; const score = (n) => n.includes("flash") ? 0 : n.includes("pro") ? 1 : 2; return score(an) - score(bn); });
            if (!candidates.length) return "⚠️ API Virhe: Ei malleja.";
            
            let lastError = "Virhe";
            for (const m of candidates.slice(0, 6)) { 
                const r = await tryModelGenerate(m.name, prompt, imageBase64, mimeType);
                if (r.ok) { return r.text; }
                lastError = r.error || lastError;
            }
            return "⚠️ API Virhe: " + lastError;
        }

        async function tryModelGenerate(modelName, prompt, imageBase64, mimeType) {
            const url = `https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${geminiKey}`;
            let parts = [{ text: prompt }];
            if (imageBase64 && mimeType) { parts.push({ inlineData: { mimeType: mimeType, data: imageBase64 } }); }
            try {
                const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: parts }] }) });
                const json = await res.json();
                if (!res.ok || json.error) return { ok: false, error: json?.error?.message, isNotFound: (json?.error?.status === "NOT_FOUND" || res.status === 404) };
                const text = json?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) return { ok: false, error: "Tyhjä vastaus." };
                return { ok: true, text };
            } catch (e) { return { ok: false, error: "Yhteysvirhe." }; }
        }

        function exportLog() {
            if (logs.length === 0) return alert("Kronikka on tyhjä!");
            let logText = "KAMPANJAN KRONIKKA\n==============================\n\n";
            let tempDiv = document.createElement('div');
            [...logs].reverse().forEach(logHtml => {
                tempDiv.innerHTML = logHtml.replace(/<br>/g, '\n'); 
                logText += (tempDiv.innerText || tempDiv.textContent).trim() + "\n\n------------------------------\n\n";
            });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([logText], { type: "text/plain;charset=utf-8" }));
            link.download = `keskimaa_kronikka_${new Date().toISOString().slice(0,10)}.txt`;
            link.click();
        }

        function undoLastPoint() { if (draw.points.length > 0) { draw.points.pop(); renderTempPoly(); } }
        
        function setTool(t) { 
            tool = t; 
            document.getElementById('viewport').style.cursor = t === 'move' ? 'grab' : (t === 'delete' || t === 'edit') ? 'pointer' : 'crosshair'; 
            document.querySelectorAll('#map-tool-btns button').forEach(b => b.classList.remove('active-tool')); 
            document.getElementById(t === 'move' ? 'btnMove' : t === 'fort' ? 'btnFort' : t === 'area' ? 'btnArea' : t === 'edit' ? 'btnEdit' : 'btnDelete').classList.add('active-tool'); 
            document.getElementById('draw-tools').style.display = t === 'area' ? 'flex' : 'none'; 
            draw.points = []; 
            renderTempPoly(); 
        }
        
        function renderTempPoly() { let svg=document.getElementById('svg-layer'), old=document.getElementById('temp-poly'); if(old)old.remove(); if(draw.points.length){ let el=document.createElementNS("http://www.w3.org/2000/svg","polyline"); el.id='temp-poly'; el.setAttribute("points",draw.points.map(p=>`${p.x},${p.y}`).join(" ")); el.setAttribute("fill","none"); el.setAttribute("stroke","#ff3333"); el.setAttribute("stroke-width","3"); el.setAttribute("stroke-dasharray","5,5"); svg.appendChild(el); } }
        function finishPoly() { if(draw.points.length<3) return; let name=prompt("Alue:"); if(name){ let cx=0,cy=0; draw.points.forEach(p=>{cx+=p.x;cy+=p.y}); cx/=draw.points.length; cy/=draw.points.length; if (!nazguls[currentNaz].territories) nazguls[currentNaz].territories = []; nazguls[currentNaz].territories.push({points:[...draw.points],label:name,cx,cy}); renderOverlays(); uploadState(); } setTool('move'); }
        function cancelPoly() { setTool('move'); }
        
        function openSettings() { 
            document.getElementById('settings-overlay').style.display='flex'; 
            document.getElementById('apiKeyInput').value = geminiKey; 
            document.getElementById('loreInput').value = campaignLore; 
            document.getElementById('gmSecretArea').style.display = 'none';
            document.getElementById('gmUnlockBtn').style.display = 'block';
        }
        function unlockGM() { if (prompt("Anna pelinjohtajan salasana:") === "mordor") { document.getElementById('gmSecretArea').style.display = 'flex'; document.getElementById('gmUnlockBtn').style.display = 'none'; } else alert("Väärä salasana."); }
        function closeSettings() { document.getElementById('settings-overlay').style.display='none'; }
        function saveSettings() { geminiKey = document.getElementById('apiKeyInput').value; campaignLore = document.getElementById('loreInput').value; localStorage.setItem('geminiKey', geminiKey); localStorage.setItem('campaignLore', campaignLore); closeSettings(); }
        
        function renderOverlays() {
            let svg=document.getElementById('svg-layer'), m=document.getElementById('marker-layer'), t=document.getElementById('temp-poly');
            svg.innerHTML=''; m.innerHTML=''; if(t)svg.appendChild(t);
            nazguls.forEach((n, nIndex)=>{
                (n.territories||[]).forEach((te, teIndex)=>{
                    let p=document.createElementNS("http://www.w3.org/2000/svg","polygon");
                    p.setAttribute("points",te.points.map(pt=>`${pt.x},${pt.y}`).join(" ")); p.setAttribute("fill",n.color); p.setAttribute("fill-opacity","0.25"); p.setAttribute("stroke",n.color); p.setAttribute("stroke-width","2");
                    p.setAttribute("data-naz", nIndex); p.setAttribute("data-ter", teIndex); p.setAttribute("class", "map-polygon");
                    svg.appendChild(p);
                    let txt=document.createElement('div'); txt.className='region-text'; txt.innerText=te.label; txt.style.left=te.cx+'px'; txt.style.top=te.cy+'px'; txt.style.color=n.color; m.appendChild(txt);
                });
                (n.markers||[]).forEach((mk, mkIndex)=>{
                    let el=document.createElement('div'); el.className='marker'; el.style.left=mk.x+'px'; el.style.top=mk.y+'px';
                    el.setAttribute("data-naz", nIndex); el.setAttribute("data-mar", mkIndex);
                    el.innerHTML=`<div class="pin" style="background:${n.color}"></div><div class="label">${mk.label}</div>`; m.appendChild(el);
                });
            });
        }
        
        function updateUI() {
            currentNaz = document.getElementById('nazgulSelect').value; let n = nazguls[currentNaz];
            document.getElementById('statsDisplay').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px; font-size:0.9em;"><span>💰 Vauraus: ${n.wealth}/10</span><div><button class="stat-btn" onclick="adjustStat('wealth', -1)">-</button><button class="stat-btn" onclick="adjustStat('wealth', 1)">+</button></div></div><div style="background:#333;height:6px;margin-bottom:5px"><div style="background:#d4af37;height:100%;width:${n.wealth*10}%"></div></div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px; font-size:0.9em;"><span>👁️ Uskonto: ${n.religion}/10</span><div><button class="stat-btn" onclick="adjustStat('religion', -1)">-</button><button class="stat-btn" onclick="adjustStat('religion', 1)">+</button></div></div><div style="background:#333;height:6px;margin-bottom:5px"><div style="background:#9370db;height:100%;width:${n.religion*10}%"></div></div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px; font-size:0.9em;"><span>⚔️ Asevoima: ${n.might}/10</span><div><button class="stat-btn" onclick="adjustStat('might', -1)">-</button><button class="stat-btn" onclick="adjustStat('might', 1)">+</button></div></div><div style="background:#333;height:6px;margin-bottom:5px"><div style="background:#b22222;height:100%;width:${n.might*10}%"></div></div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px; font-size:0.9em;"><span>⚖️ Lojaalisuus: ${n.loyalty}/10</span><div><button class="stat-btn" onclick="adjustStat('loyalty', -1)">-</button><button class="stat-btn" onclick="adjustStat('loyalty', 1)">+</button></div></div><div style="background:#333;height:6px;margin-bottom:5px"><div style="background:#4682b4;height:100%;width:${n.loyalty*10}%"></div></div>
            `;
        }
    </script>
